name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore OptiscalerClient.sln

      - name: Build
        run: dotnet build OptiscalerClient.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test Tests/OptiscalerClient.Tests.csproj --configuration Release --no-build --verbosity normal

      - name: Vulnerability audit
        run: dotnet list OptiscalerClient.csproj package --vulnerable
